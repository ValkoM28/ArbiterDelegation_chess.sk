name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.2.3)'
        required: true

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build binaries
        run: |
          mkdir -p dist

          declare -A targets=(
            ["linux-amd64"]="linux/amd64"
            ["linux-arm64"]="linux/arm64"
            ["darwin-amd64"]="darwin/amd64"
            ["darwin-arm64"]="darwin/arm64"
            ["windows-amd64"]="windows/amd64"
            ["windows-arm64"]="windows/arm64"
          )

          for name in "${!targets[@]}"; do
            platform="${targets[$name]}"
            OS="${platform%/*}"
            ARCH="${platform#*/}"
            BINARY="server"
            [ "$OS" = "windows" ] && BINARY="server.exe"

            echo "Building $name..."
            GOOS=$OS GOARCH=$ARCH go build \
              -ldflags="-s -w" \
              -o "dist/$name/$BINARY" \
              ./cmd/server
          done

      - name: Package archives
        run: |
          for name in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            cp -r assets templates web README.md LICENSE "dist/$name/"
            tar -czf "$name.tar.gz" -C dist "$name"
          done

          for name in windows-amd64 windows-arm64; do
            cp -r assets templates web README.md LICENSE "dist/$name/"
            (cd dist && zip -r "../$name.zip" "$name")
          done

      - name: Generate checksums
        run: |
          sha256sum \
            linux-amd64.tar.gz \
            linux-arm64.tar.gz \
            darwin-amd64.tar.gz \
            darwin-arm64.tar.gz \
            windows-amd64.zip \
            windows-arm64.zip \
            > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            linux-amd64.tar.gz
            linux-arm64.tar.gz
            darwin-amd64.tar.gz
            darwin-arm64.tar.gz
            windows-amd64.zip
            windows-arm64.zip
            checksums.sha256
